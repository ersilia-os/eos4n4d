Status: In progress
Title: Weighted Gram-Negative Accumulation Prediction
Description: Prediction of small-molecule accumulation in Gram-negative bacteria
  using the weighted ensemble described by Köllen et al. The model combines an 
  AutoML predictor trained on the Richter accumulation dataset with the 
  TwinBooster zero-shot predictor, weighting both components by top-k Tanimoto 
  similarity to the training set. It returns a single weighted accumulation 
  score per compound for prioritization of molecules likely to accumulate in 
  Gram-negative bacteria.
